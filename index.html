<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASZ Summer Offer</title>
<style>
*{box-sizing:border-box}
body{
margin:0;
min-height:100vh;
background:#030303;
color:white;
font-family:Arial,Tahoma,sans-serif;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}
.bg{
position:fixed;inset:0;
background:
radial-gradient(circle at center,#1b0b00 0%,#050505 45%,#000 100%);
z-index:-3;
}
.lines:before,.lines:after{
content:"";
position:fixed;
top:8%;
width:35%;
height:80%;
border:3px solid #ff6a00;
filter:drop-shadow(0 0 20px #ff6a00);
opacity:.6;
}
.lines:before{left:-8%;transform:skewX(-28deg)}
.lines:after{right:-8%;transform:skewX(28deg)}
.wrap{
width:96vw;
height:96vh;
padding:25px;
text-align:center;
border:1px solid rgba(255,106,0,.25);
box-shadow:0 0 60px rgba(255,106,0,.18) inset;
}
.logo{
font-size:90px;
font-weight:900;
color:#ff6a00;
letter-spacing:12px;
text-shadow:0 0 25px #ff6a00;
margin-top:5px;
}
.slogan{
font-size:34px;
margin-top:5px;
}
.en{
color:#ccc;
letter-spacing:7px;
font-size:16px;
margin-top:7px;
}
.offer{
margin-top:25px;
font-size:64px;
font-weight:900;
color:#ff8a00;
text-shadow:0 0 25px #ff6a00;
}
.sub{
font-size:30px;
margin-top:10px;
color:#eee;
}
.timer{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:22px;
margin:35px auto 25px;
max-width:1150px;
direction:ltr;
}
.card{
background:rgba(10,10,10,.88);
border:3px solid #ff6a00;
border-radius:26px;
padding:24px 10px;
box-shadow:0 0 25px rgba(255,106,0,.55), inset 0 0 35px rgba(255,106,0,.12);
}
.num{
font-size:105px;
font-weight:900;
color:#ff7800;
text-shadow:0 0 22px #ff6a00;
font-family:Impact,Arial Black,sans-serif;
}
.lbl{
font-size:28px;
margin-top:8px;
}
.info{
display:flex;
justify-content:center;
gap:45px;
align-items:center;
font-size:28px;
border:2px solid #ff6a00;
border-radius:22px;
padding:14px 30px;
width:max-content;
margin:0 auto 28px;
box-shadow:0 0 20px rgba(255,106,0,.35);
}
.features{
display:grid;
grid-template-columns:repeat(9,1fr);
gap:10px;
margin-top:20px;
}
.feature{
border-top:2px solid #ff6a00;
padding:16px 6px 8px;
min-height:105px;
}
.ico{
font-size:38px;
color:#ff7a00;
}
.feature b{
display:block;
font-size:18px;
margin-top:8px;
}
.feature span{
display:block;
font-size:12px;
color:#ccc;
margin-top:4px;
}
.bottom{
position:absolute;
bottom:22px;
left:0;
right:0;
font-size:28px;
color:#ff7a00;
letter-spacing:6px;
font-weight:bold;
}
.badge{
position:absolute;
top:25px;
left:25px;
border:2px solid #ff6a00;
border-radius:0 0 25px 25px;
padding:15px 24px;
font-size:22px;
color:#fff;
}
.badge strong{color:#ff7a00;font-size:38px}
@media(max-width:900px){
.wrap{height:auto;overflow:auto}
.logo{font-size:55px}
.offer{font-size:40px}
.timer{grid-template-columns:repeat(2,1fr)}
.features{grid-template-columns:repeat(3,1fr)}
.num{font-size:70px}
.info{font-size:20px;flex-direction:column;gap:8px}
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="lines"></div>

<div class="badge"><strong>24/7</strong><br>مفتوح 24 ساعة</div>

<div class="wrap">
  <div class="logo">ASZ</div>
  <div class="slogan">مصنع الأبطال</div>
  <div class="en">CHAMPIONS ARE MADE HERE</div>

  <div class="offer">☀️ عرض الصيف 2026</div>
  <div class="sub">لا تفوت الفرصة... ينتهي العرض خلال</div>

  <div class="timer">
    <div class="card"><div class="num" id="days">00</div><div class="lbl">يوم<br>DAYS</div></div>
    <div class="card"><div class="num" id="hours">00</div><div class="lbl">ساعة<br>HOURS</div></div>
    <div class="card"><div class="num" id="minutes">00</div><div class="lbl">دقيقة<br>MINUTES</div></div>
    <div class="card"><div class="num" id="seconds">00</div><div class="lbl">ثانية<br>SECONDS</div></div>
  </div>

  <div class="info">
    <div>📅 ينتهي العرض بتاريخ <b>18 / 07 / 2026</b></div>
    <div>🕚 الساعة <b>11:59
