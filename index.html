<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASZ Countdown</title>

<style>
body{
  margin:0;
  background:#000;
  color:#ff7a00;
  font-family:Arial, sans-serif;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.box{
  width:95%;
}
.club{
  font-size:90px;
  font-weight:bold;
  margin-bottom:20px;
}
.title{
  color:#fff;
  font-size:42px;
  margin-bottom:40px;
}
.timer{
  display:flex;
  justify-content:center;
  gap:25px;
  flex-wrap:wrap;
}
.item{
  background:#111;
  border:3px solid #ff7a00;
  border-radius:22px;
  padding:25px;
  min-width:160px;
}
.num{
  font-size:80px;
  font-weight:bold;
  color:#ff7a00;
}
.label{
  font-size:28px;
  color:#fff;
}
.note{
  margin-top:40px;
  color:#fff;
  font-size:34px;
}
</style>
</head>

<body>
<div class="box">
  <div class="club">ASZ</div>
  <div class="title">عرض نادي ASZ ينتهي بعد</div>

  <div class="timer">
    <div class="item"><div class="num" id="days">00</div><div class="label">يوم</div></div>
    <div class="item"><div class="num" id="hours">00</div><div class="label">ساعة</div></div>
    <div class="item"><div class="num" id="minutes">00</div><div class="label">دقيقة</div></div>
    <div class="item"><div class="num" id="seconds">00</div><div class="label">ثانية</div></div>
  </div>

  <div class="note" id="message">سارع بالاشتراك قبل انتهاء العرض</div>
</div>

<script>
const endDate = new Date("2026-07-18T23:59:00+03:00").getTime();

function updateTimer(){
  const now = new Date().getTime();
  const distance = endDate - now;

  if(distance <= 0){
    document.getElementById("days").innerHTML = "00";
    document.getElementById("hours").innerHTML = "00";
    document.getElementById("minutes").innerHTML = "00";
    document.getElementById("seconds").innerHTML = "00";
    document.getElementById("message").innerHTML = "انتهى العرض";
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("days").innerHTML = days;
  document.getElementById("hours").innerHTML = hours.toString().padStart(2, "0");
  document.getElementById("minutes").innerHTML = minutes.toString().padStart(2, "0");
  document.getElementById("seconds").innerHTML = seconds.toString().padStart(2, "0");
}

updateTimer();
setInterval(updateTimer, 1000);
</script>
</body>
</html>
